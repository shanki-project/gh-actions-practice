name: Artifacts Example

on:
  workflow_dispatch:

jobs:
  create_file:
    runs-on: ubuntu-latest
    steps:
      - name: Create a report file
        run: echo "Build completed by Shanki at $(date)" > report.txt

      - name: Upload the file as artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-report
          path: report.txt

  read_file:
    needs: create_file
    runs-on: ubuntu-latest
    steps:
      - name: Download the artifact
        uses: actions/download-artifact@v4
        with:
          name: my-report

      - name: Read the file content
        run: cat report.txt
