name: Docker Pull and Run with Outputs

on:
  workflow_dispatch:

jobs:
  pull_image:
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.set_tag.outputs.tag }}

    steps:
      - name: Pull nginx image
        run: docker pull nginx:latest

      - name: Set image tag output
        id: set_tag
        run: echo "tag=nginx:latest" >> "$GITHUB_OUTPUT"

  run_container:
    needs: pull_image
    runs-on: ubuntu-latest

    steps:
      - name: Show the tag received from Job 1
        run: echo "Job1 told me to use:" ${{ needs.pull_image.outputs.image_tag }}

      - name: Pull the same image again
        run: docker pull ${{ needs.pull_image.outputs.image_tag }}

      - name: Run nginx container
        run: docker run -d -p 8080:80 ${{ needs.pull_image.outputs.image_tag }}

      - name: Check it's running
        run: docker ps